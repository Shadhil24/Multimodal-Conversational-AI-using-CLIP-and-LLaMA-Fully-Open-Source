<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zephyr - Your Personal Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/chat.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="chat-body">
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">Zephyr</span>
      </div>
      <nav class="nav-links" aria-label="Main">
        <a href="/" class="nav-link active">Chat</a>
        <a href="/legacy" class="nav-link">Analyze</a>
      </nav>
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking…</span>
      </div>
    </div>
  </header>

  <main class="chat-main">
    <div class="chat-thread" id="chatThread" aria-live="polite">
      <div class="chat-welcome" id="chatWelcome">
        <h1 class="chat-welcome-title">Assistant</h1>
        <p class="chat-welcome-text">
          Send a message, attach an image, or both. Images are interpreted with BLIP and your
          configured Ollama model for context.
        </p>
      </div>
    </div>

    <div class="chat-composer-wrap">
      <div id="attachPreview" class="attach-preview" style="display:none">
        <img id="attachPreviewImg" alt="Attachment preview" />
        <button type="button" class="attach-remove" id="attachRemove" title="Remove image">✕</button>
      </div>
      <div class="chat-composer">
        <input type="file" id="attachInput" accept="image/*" hidden />
        <button type="button" class="icon-btn" id="attachBtn" title="Attach image" aria-label="Attach image">+</button>
        <textarea
          id="chatInput"
          class="chat-input"
          rows="1"
          placeholder="Message (optional if you attach an image)"
          maxlength="8000"
        ></textarea>
        <button type="button" class="chat-send" id="sendBtn" title="Send">
          <span id="sendLabel">Send</span>
          <span class="btn-spinner" id="sendSpinner" style="display:none"></span>
        </button>
      </div>
      <p class="chat-hint">Enter to send · Shift+Enter for a new line</p>
    </div>
  </main>

  <footer class="footer chat-footer">
    <p>ImageBot · Ollama <span id="footerModel"></span></p>
  </footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
